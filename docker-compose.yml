services:
  netbox:
    image: netboxcommunity/netbox:v4.5.8
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      redis-cache:
        condition: service_started
    env_file: env/netbox.env
    volumes:
      - ./data:/data
      - ./scripts:/scripts
      - ./config/extra.py:/etc/netbox/config/extra.py:ro
      - netbox-media:/opt/netbox/netbox/media
      - netbox-reports:/opt/netbox/netbox/reports
      - netbox-scripts:/opt/netbox/netbox/scripts
    ports:
      - "8000:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/login/"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 300s

  netbox-worker:
    image: netboxcommunity/netbox:v4.5.8
    depends_on:
      netbox:
        condition: service_healthy
    command: /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py rqworker
    env_file: env/netbox.env
    volumes:
      - ./config/extra.py:/etc/netbox/config/extra.py:ro
      - netbox-media:/opt/netbox/netbox/media
      - netbox-reports:/opt/netbox/netbox/reports
      - netbox-scripts:/opt/netbox/netbox/scripts

  netbox-housekeeping:
    image: netboxcommunity/netbox:v4.5.8
    depends_on:
      netbox:
        condition: service_healthy
    command: /opt/netbox/housekeeping.sh
    env_file: env/netbox.env

  postgres:
    image: postgres:16-alpine
    env_file: env/postgres.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  redis-cache:
    image: redis:7-alpine
    command: redis-server

volumes:
  postgres-data:
  redis-data:
  netbox-media:
  netbox-reports:
  netbox-scripts:
