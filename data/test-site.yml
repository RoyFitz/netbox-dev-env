# Devices
devices:
  - name: FSW-01
    device_type:
      slug: brs20-1000s2s2-stcy99hhses
    role:
      slug: field-switch
    site:
      slug: tst1
    status: active
    local_context_data:
      interfaces:
        physical_map:
          field-mgmt-access: "1/10"
          mgmt: "Management"
          ring_down: "1/2"
          ring_up: "1/1"
      ring_topology_field_ring:
        priority: 32768
        protocol: "mrp"
        recovery_delay: "200ms"
        role: "client"
        vlan: 101
      site_blueprint:
        block_num: 1
        device_seq: 1
        role_slug: "field-switch"

# IP Address Management
vrfs:
  - name: Production
    rd: "65001:100"

prefixes:
  - prefix: 10.0.0.0/8
    status: container
    description: Private RFC1918 Space
  - prefix: 10.1.0.0/16
    status: active
    site:
      slug: tst1
    vrf:
      name: Production

ip_addresses:
  - address: 10.1.1.1/32
    status: active

